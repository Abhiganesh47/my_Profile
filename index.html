<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Abhiganesh R</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="css/custom.css">
</head>

<body class="dark:bg-gray-900 dark:text-white">

    <!-- HERO SECTION -->
    <section
        class="min-h-screen flex flex-col lg:flex-row lg:items-center lg:justify-between px-8 lg:px-16 py-20 gap-12 lg:gap-20">

        <div class="order-2 lg:order-1 flex-1 lg:max-w-lg text-center lg:text-left">

            <h1 class="text-5xl mb-6">Abhiganesh R</h1>

            <!-- Typing Animation -->
            <p id="typing-text" class="text-xl lg:text-2xl text-slate-600 font-bold mb-10 max-w-md mx-auto lg:mx-0">
            </p>

            <!-- GitHub Stats -->
            <div id="github-stats" class="text-sm mb-6"></div>

            <div
                class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start items-center lg:items-start mb-8">

                <a href="#projects" class="bg-red-400 hover:bg-green-500 px-10 py-4 rounded shadow-xl">
                    View Projects
                </a>

                <a href="Abhiganesh_Resume.pdf" class="bg-blue-400 hover:bg-green-500 px-10 py-4 rounded shadow-xl">
                    View Resume
                </a>

            </div>

            <div class="flex flex-wrap gap-6 justify-center lg:justify-start text-sm font-bold">
                <span>79+ Github Commits</span>
                <span>5 LeetCode Questions solved</span>
                <span>10+ Live Projects Completed</span>
            </div>

        </div>

        <div class="order-1 lg:order-2 w-full lg:w-96 max-w-sm mx-auto lg:mx-0">

            <img src="pic.png" alt="Abhi Ganesh profile photo"
                class="aspect-square w-full rounded shadow-lg mx-auto lg:mx-0 hover:ring-blue-500 transition-all duration-300 hover:scale-[1.02]"
                loading="lazy">

        </div>

    </section>

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b shadow-lg">

        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

            <a href="#"
                class="text-2xl font-bold bg-clip-text bg-gradient-to-r from-red-400 to-slate-700 text-transparent">
                AG
            </a>

            <ul class="hidden md:flex items-center gap-10">
                <li><a href="#projects" class="text-lg font-bold hover:text-blue-600">Projects</a></li>
                <li><a href="#experience" class="text-lg font-bold hover:text-blue-600">Experience</a></li>
                <li><a href="#skills" class="text-lg font-bold hover:text-blue-600">Skills</a></li>
            </ul>

            <button id="theme-toggle" class="bg-blue-200 px-4 py-2 rounded font-bold">Theme</button>

            <a href="#contact" class="bg-red-400 hover:bg-green-500 rounded px-8 py-3">
                Let's talk
            </a>

        </div>

    </nav>

    <!-- PROJECTS -->
    <section id="projects" class="py-24 px-8 lg:px-16">

        <div class="max-w-7xl mx-auto">

            <div class="text-center mb-10">
                <h2 class="text-4xl lg:text-5xl mb-6">My Projects</h2>
                <p class="text-xl max-w-2xl mx-auto">
                    Enterprise scale full-stack applications built with modern frameworks
                </p>
            </div>

            <!-- Search -->
            <div class="mb-6 text-center">
                <input id="project-search" type="text" placeholder="Search projects..."
                    class="border rounded px-6 py-3 w-full max-w-md">
            </div>

            <!-- Sort -->
            <div class="text-center mb-6">
                <select id="project-sort" class="border px-4 py-2 rounded">
                    <option value="default">Sort</option>
                    <option value="name">Name</option>
                    <option value="likes">Most Liked</option>
                </select>
            </div>

            <!-- Filters -->
            <div id="project-filters" class="flex flex-wrap justify-center gap-4 mb-12"></div>

            <!-- Projects -->
            <div id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

        </div>

    </section>

    <!-- EXPERIENCE -->
    <section id="experience" class="py-24 px-8 lg:px-16">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-4xl text-gray-700 text-center mb-20">
                Education and Experience
            </h2>
        </div>
    </section>

    <!-- SKILLS -->
    <section id="skills" class="py-24 px-8 lg:px-16 bg-blue-100">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl text-center font-bold mb-20">
                Skills
            </h2>
            <div id="skills-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </div>
    </section>

    <!-- CONTACT MODAL -->
    <button id="modal-trigger"
        class="fixed bottom-8 right-8 w-16 h-16 bg-blue-900 text-white rounded-full shadow-2xl flex items-center justify-center text-2xl font-bold">
        ☏
    </button>

    <div id="contact-modal" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-md">

        <div class="flex items-center justify-center min-h-screen p-4">

            <div id="modal-content" class="bg-white w-full max-w-md rounded-2xl shadow-2xl transition-all duration-300">

                <div class="border-b p-8 bg-white relative">
                    <h3 class="text-2xl font-bold">Contact Me</h3>
                    <button id="modal-close" class="absolute top-6 right-6 text-2xl font-bold">×</button>
                </div>

                <form id="contact-form" class="p-8 space-y-4">

                    <input id="contact-name" type="text" placeholder="Your name"
                        class="w-full border rounded px-4 py-3">

                    <input id="contact-email" type="email" placeholder="email@website.com"
                        class="w-full border rounded px-4 py-3">

                    <p id="form-message" class="text-sm text-red-500"></p>

                    <div class="flex flex-col sm:flex-row gap-4 pt-4">

                        <button type="button" id="form-cancel" class="flex-1 font-bold py-4 px-6">
                            Cancel
                        </button>

                        <button type="submit" class="flex-1 font-bold py-4 px-6">
                            Submit
                        </button>

                    </div>

                    <!-- Copy Email -->
                    <button type="button" id="copy-email" class="bg-blue-400 px-4 py-2 rounded w-full">
                        Copy Email
                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- BACK TO TOP -->
    <button id="backToTop" class="fixed bottom-6 left-6 hidden bg-black text-white px-4 py-2 rounded">
        ↑
    </button>

    <!-- TOAST -->
    <div id="toast" class="fixed top-6 right-6 bg-green-500 text-white px-6 py-3 rounded hidden">
    </div>

    <!-- JS FILES -->
    <script src="js/data/projects.js"></script>
    <script src="js/data/skills.js"></script>
    <script src="js/features/skills-render.js"></script>
    <script src="js/features/modal.js"></script>
    <script src="js/features/contact-validation.js"></script>
    <script src="js/features/theme-toggle.js"></script>
    <script src="js/features/project-search.js"></script>
    <script src="js/features/project-filter.js"></script>
    <script src="js/features/typing-effect.js"></script>
    <script src="js/features/sort-feature.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
